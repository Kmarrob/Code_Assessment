# Políticas de Segurança - Code_Assessment
# Gerado em: 06/17/2026 16:24:31

[PasswordPolicy]
MinLength = 12
RequireUppercase = true
RequireLowercase = true
RequireNumbers = true
RequireSpecialChars = true
MaxAge = 90
HistorySize = 5
PreventCommonPasswords = true
PreventPersonalInfo = true

[SessionPolicy]
MaxConcurrentSessions = 5
SessionTimeout = 3600
RememberMeDays = 30

[RateLimiting]
LoginAttempts = 5
LoginWindow = 15
RegisterAttempts = 10
RegisterWindow = 60
RefreshAttempts = 10
RefreshWindow = 15
AuthenticatedRequests = 100
AuthenticatedWindow = 1
SensitiveRequests = 5
SensitiveWindow = 60

[SecurityLogging]
Enabled = true
Level = info
RetentionDays = 90
